name: MI Integration Tests - Parallel Execution

on:
  push:
    branches: [ "integration-self-build" ]
  pull_request:
    branches: [ "integration-self-build" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: ['11']  # Java versions to test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build MI pack
        run: mvn clean install -DskipTests=true -fae

      - name: Run Integration Tests
        run: |
          cd integration
          mvn clean install -DskipTests=false -fae
